---
title: 最適化入門
language: ja
audience: 学部3年生くらいで、プログラミング言語処理系初心者
notes: |-
  古今東西の言語処理系の最適化をとにかくあつめる。
  動的言語、静的言語問わず（それぞれに特化していれば、部を分けてもいい）。
  ピープホール最適化から whole program analyze まで。
  最新研究まで盛り込んでください。どれだけ時間がかかってもいいです。
  とにかく幅広く集めてください。
  詳しくなるための専門書なので、すべての方式について「こういうことが知られている」と適当に流すのではなく、しっかりとコード付きで理解可能な形で残してください。

  https://github.com/kolanglab のシリーズです。例えばデータ構造や GC など、他で説明しているので、取り扱わなくていいです。

  注意:
  * 未使用用語は説明する
  * 例だけの (sub)section は作らない。ちゃんと説明する
  * コードを出すだけの (sub)section は作らない。ちゃんと説明する
  * 参考文献は積極的に引用する
  * 言語処理系のプログラムの例を出すときはなるべく Ruby を使う
